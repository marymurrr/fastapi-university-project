<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pink Tasks - Hearts Edition</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 50px 20px;
            background: #fff0f5; 
            color: #c71585; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background: Floating hearts and sparkles */
        .hearts-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .heart {
            position: absolute;
            color: #ffb6c1;
            animation: float 10s linear infinite;
            opacity: 0.6;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Form Container Styling */
        .container { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4); 
            border: 2px solid #ffb6c1; 
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        h1 { color: #db7093; text-align: center; margin-top: 0; font-size: 32px; }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 2px solid #ffe4e1; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; color: #c71585;
        }
        input:focus { border-color: #ff69b4; outline: none; background: #fffaf0; }

        button.add-btn { 
            background: linear-gradient(45deg, #ff69b4, #db7093); 
            color: white; border: none; padding: 14px; border-radius: 12px; 
            cursor: pointer; width: 100%; font-weight: bold; font-size: 16px;
            text-transform: uppercase; transition: 0.3s;
        }
        button.add-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(219, 112, 147, 0.4); }

        /* Task List and Task Items Styling */
        .task-list { width: 100%; max-width: 500px; }
        
        .task-item { 
            background: rgba(255, 255, 255, 0.9); 
            border: 2px solid #ffb6c1; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.2);
            transition: 0.3s;
        }
        .task-item:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4); }

        .task-info h3 { margin: 0; color: #db7093; font-size: 20px; }
        .task-info p { margin: 5px 0 0; font-size: 14px; color: #ff69b4; }

        .delete-btn { 
            background: #fff0f5; border: 1px solid #ffb6c1; 
            border-radius: 50%; width: 40px; height: 40px; 
            cursor: pointer; font-size: 18px; display: flex;
            align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .delete-btn:hover { background: #ff69b4; color: white; }

        .logout { position: absolute; top: 20px; right: 20px; }
        .logout a { color: #db7093; text-decoration: none; font-weight: bold; font-size: 14px; background: white; padding: 8px 15px; border-radius: 10px; border: 1px solid #ffb6c1; }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsContainer"></div>

    <div class="logout"><a href="/login.html">👋 Logout</a></div>

    <div class="container">
        <h1>🎀 My Tasks</h1>
        <form id="taskForm">
            <input type="text" id="title" placeholder="What's the plan, princess?" required>
            <input type="text" id="description" placeholder="Any pink details?">
            <button type="submit" class="add-btn">Add to Pink List</button>
        </form>
    </div>

    <div id="taskList" class="task-list"></div>

<script>
    // Visual Effects: Dynamic heart generation for background
    function createHeart() {
        const container = document.getElementById('heartsContainer');
        const heart = document.createElement('div');
        const emojis = ['💗', '💖', '🌸', '✨', '💕', '🎀'];
        heart.className = 'heart';
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
        heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
        container.appendChild(heart);
        setTimeout(() => { heart.remove(); }, 10000);
    }
    setInterval(createHeart, 500);

    // Application State and API Logic
    const taskList = document.getElementById('taskList');
    const token = localStorage.getItem('accessToken');

    // Fetch and render user-specific tasks from the backend
    async function fetchTasks() {
        try {
            const response = await fetch("/tasks/", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (response.ok) {
                const tasks = await response.json();
                taskList.innerHTML = "";
                tasks.forEach(task => {
                    const item = document.createElement('div');
                    item.className = 'task-item';
                    item.innerHTML = `
                        <div class="task-info">
                            <h3>${task.title}</h3>
                            <p>${task.description || 'No description provided ✨'}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${task.id})">🗑️</button>
                    `;
                    taskList.appendChild(item);
                });
            } else if (response.status === 401) {
                // Redirect to login if token is invalid or expired
                window.location.href = '/login.html';
            }
        } catch (e) { console.error("Error fetching tasks:", e); }
    }

    // Delete a task by ID with user confirmation
    async function deleteTask(id) {
        if (!confirm("Are you sure you want to delete this pink task? 🌸")) return;
        await fetch(`/tasks/${id}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${token}` }
        });
        fetchTasks();
    }

    // Handle Task creation form submission
    document.getElementById("taskForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const taskData = {
            title: document.getElementById("title").value,
            description: document.getElementById("description").value
        };
        await fetch("/tasks/", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify(taskData)
        });
        document.getElementById("taskForm").reset();
        fetchTasks();
    });

    // Initial load of the task list
    fetchTasks();
</script>
</body>
</html>
