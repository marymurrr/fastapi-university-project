<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pink Gateway</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff0f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; position: relative; }
        .hearts-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .heart { position: absolute; color: #ffb6c1; animation: float 10s linear infinite; opacity: 0.6; }
        @keyframes float { 0% { transform: translateY(110vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; } }

        .login-card { background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3); width: 350px; border: 2px solid #ffb6c1; backdrop-filter: blur(5px); transition: 0.3s; }
        h2 { text-align: center; color: #db7093; margin-bottom: 25px; font-size: 28px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ffe4e1; border-radius: 10px; box-sizing: border-box; font-size: 16px; color: #c71585; }
        input:focus { border-color: #ff69b4; outline: none; background: #fffaf0; }
        button { background: linear-gradient(45deg, #ff69b4, #db7093); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; margin-top: 10px; }
        
        .toggle-link { text-align: center; margin-top: 20px; font-size: 14px; color: #db7093; cursor: pointer; text-decoration: underline; }
        #message { margin-top: 15px; text-align: center; font-size: 14px; padding: 10px; border-radius: 8px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="hearts-bg" id="heartsContainer"></div>

    <div class="login-card">
        <h2 id="formTitle">💖 Login</h2>
        
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Get Pink Access</button>
        </form>

        <form id="registerForm" class="hidden">
            <input type="text" id="regUsername" placeholder="New Username" required>
            <input type="email" id="regEmail" placeholder="Your Email" required>
            <input type="password" id="regPassword" placeholder="Strong Password" required>
            <button type="submit">Create Account</button>
        </form>

        <div id="message"></div>
        <div class="toggle-link" id="toggleLink">No account? Sign Up!</div>
    </div>

    <script>
        // Сердечки (как раньше)
        function createHeart() {
            const container = document.getElementById('heartsContainer');
            const heart = document.createElement('div');
            const emojis = ['💗', '💖', '🌸', '✨', '💕'];
            heart.className = 'heart'; heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            container.appendChild(heart); setTimeout(() => heart.remove(), 10000);
        }
        setInterval(createHeart, 500);

        // Переключение между Логином и Регистрацией
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const formTitle = document.getElementById('formTitle');
        const toggleLink = document.getElementById('toggleLink');
        const message = document.getElementById('message');

        let isLogin = true;

        toggleLink.onclick = () => {
            isLogin = !isLogin;
            message.style.display = 'none';
            if (isLogin) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                formTitle.textContent = '💖 Login';
                toggleLink.textContent = 'No account? Sign Up!';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                formTitle.textContent = '🎀 Sign Up';
                toggleLink.textContent = 'Already have an account? Login';
            }
        };

        // ЛОГИКА ЛОГИНА
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('loginUsername').value);
            formData.append('password', document.getElementById('loginPassword').value);

            const response = await fetch('/auth/token', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('accessToken', data.access_token);
                window.location.href = '/';
            } else {
                message.style.display = 'block'; message.style.color = 'red';
                message.textContent = '❌ Invalid pink credentials!';
            }
        };

        // ЛОГИКА РЕГИСТРАЦИИ
        registerForm.onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // Отправляем как query параметры, как требует твой Python код
            const url = `/auth/register?username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;

            const response = await fetch(url, { method: 'POST' });

            if (response.ok) {
                message.style.display = 'block'; message.style.color = 'green';
                message.textContent = '✨ Success! Now please login.';
                registerForm.reset();
                setTimeout(() => toggleLink.click(), 2000); // Возвращаемся на логин через 2 сек
            } else {
                const err = await response.json();
                message.style.display = 'block'; message.style.color = 'red';
                message.textContent = '❌ Error: ' + (err.detail || 'Registration failed');
            }
        };
    </script>
</body>
</html>
